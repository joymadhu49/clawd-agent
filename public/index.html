<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Clawd Agent</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0d0f14;
      color: #e0e0e0;
      font-family: 'Courier New', 'Lucida Console', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .header {
      padding: 12px 16px;
      border-bottom: 1px solid #1a1d26;
      background: #0d0f14;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 16px;
      color: #ff6b6b;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .header .meta {
      font-size: 11px;
      color: #555;
      margin-top: 2px;
    }

    /* Messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
      white-space: pre-wrap;
    }

    .msg.user {
      align-self: flex-end;
      background: #1a2332;
      color: #8bb8ff;
      border-bottom-right-radius: 2px;
    }

    .msg.bot {
      align-self: flex-start;
      background: #1a1d26;
      color: #d0d0d0;
      border-bottom-left-radius: 2px;
    }

    .msg.error {
      align-self: flex-start;
      background: #2a1515;
      color: #ff6b6b;
      border-bottom-left-radius: 2px;
    }

    /* Typing indicator */
    .typing {
      align-self: flex-start;
      padding: 10px 14px;
      display: none;
    }

    .typing.active {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .typing span {
      width: 6px;
      height: 6px;
      background: #555;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }

    .typing span:nth-child(1) { animation-delay: 0s; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* Quick commands */
    .quick-cmds {
      padding: 8px 16px;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .quick-cmds button {
      background: #1a1d26;
      color: #888;
      border: 1px solid #2a2d36;
      padding: 4px 10px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .quick-cmds button:hover {
      background: #2a2d36;
      color: #ccc;
    }

    /* Input area */
    .input-area {
      padding: 12px 16px;
      border-top: 1px solid #1a1d26;
      background: #0d0f14;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .input-area textarea {
      flex: 1;
      background: #1a1d26;
      color: #e0e0e0;
      border: 1px solid #2a2d36;
      border-radius: 6px;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 14px;
      resize: none;
      outline: none;
      min-height: 42px;
      max-height: 120px;
      line-height: 1.4;
    }

    .input-area textarea::placeholder {
      color: #555;
    }

    .input-area textarea:focus {
      border-color: #ff6b6b;
    }

    .input-area button {
      background: #ff6b6b;
      color: #0d0f14;
      border: none;
      padding: 0 16px;
      border-radius: 6px;
      font-family: inherit;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .input-area button:hover {
      background: #ff8585;
    }

    .input-area button:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
    }

    /* Scrollbar */
    .messages::-webkit-scrollbar {
      width: 4px;
    }

    .messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .messages::-webkit-scrollbar-thumb {
      background: #2a2d36;
      border-radius: 2px;
    }

    /* Device panel */
    .device-panel {
      display: none;
      padding: 12px 16px;
      border-top: 1px solid #1a1d26;
      background: #11131a;
      flex-shrink: 0;
      overflow-x: auto;
    }

    .device-panel.active {
      display: block;
    }

    .device-panel h3 {
      font-size: 12px;
      color: #ff6b6b;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .device-btns {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .device-btns button {
      background: #1a1d26;
      color: #8bb8ff;
      border: 1px solid #2a3548;
      padding: 6px 12px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .device-btns button:hover {
      background: #1a2332;
      border-color: #8bb8ff;
    }

    .device-btns button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .device-btns button.granted {
      border-color: #4caf50;
      color: #4caf50;
    }

    .device-toggle {
      background: none;
      border: 1px solid #2a2d36;
      color: #8bb8ff;
      padding: 4px 10px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .device-toggle:hover {
      background: #1a2332;
    }

    .device-toggle.active {
      border-color: #ff6b6b;
      color: #ff6b6b;
    }

    /* Permission status badges */
    .perm-badge {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
    }

    .perm-badge.granted { background: #4caf50; }
    .perm-badge.denied { background: #ff6b6b; }
    .perm-badge.unknown { background: #555; }
  </style>
</head>
<body>

  <div class="header">
    <h1 id="agent-name">Clawd</h1>
    <div class="meta" id="agent-meta">loading...</div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="typing" id="typing">
    <span></span><span></span><span></span>
  </div>

  <div class="device-panel" id="device-panel">
    <h3>DEVICE ACCESS</h3>
    <div class="device-btns">
      <button onclick="getLocation()" id="btn-location"><span class="perm-badge unknown"></span>Location</button>
      <button onclick="getCamera()" id="btn-camera"><span class="perm-badge unknown"></span>Camera</button>
      <button onclick="getMicrophone()" id="btn-mic"><span class="perm-badge unknown"></span>Microphone</button>
      <button onclick="getBatteryInfo()" id="btn-battery"><span class="perm-badge unknown"></span>Battery</button>
      <button onclick="getNetworkInfo()" id="btn-network"><span class="perm-badge granted"></span>Network</button>
      <button onclick="getDeviceInfo()" id="btn-device"><span class="perm-badge granted"></span>Device Info</button>
      <button onclick="requestNotification()" id="btn-notif"><span class="perm-badge unknown"></span>Notifications</button>
    </div>
  </div>

  <div class="quick-cmds">
    <button onclick="sendQuick('/help')">/help</button>
    <button onclick="sendQuick('/skills')">/skills</button>
    <button onclick="sendQuick('/reset')">/reset</button>
    <button class="device-toggle" id="device-toggle" onclick="toggleDevicePanel()">Device</button>
  </div>

  <div class="input-area">
    <textarea id="input" placeholder="Type a message..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send-btn');
    const typingEl = document.getElementById('typing');
    const agentNameEl = document.getElementById('agent-name');
    const agentMetaEl = document.getElementById('agent-meta');

    // Generate a unique session ID per page load
    const sessionId = 'web-' + Math.random().toString(36).substring(2, 10) + Date.now().toString(36);

    let sending = false;

    // Fetch agent info on load
    fetch('/api/info')
      .then(r => r.json())
      .then(info => {
        agentNameEl.textContent = info.agentName || 'Clawd';
        agentMetaEl.textContent = `${info.model} | v${info.version}`;
        document.title = `${info.agentName || 'Clawd'} Agent`;
      })
      .catch(() => {
        agentMetaEl.textContent = 'offline';
      });

    // Auto-resize textarea
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });

    // Enter to send, Shift+Enter for newline
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    function addMessage(text, type) {
      const div = document.createElement('div');
      div.className = `msg ${type}`;
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function sendQuick(cmd) {
      inputEl.value = cmd;
      sendMessage();
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || sending) return;

      sending = true;
      sendBtn.disabled = true;

      // Show user message
      addMessage(text, 'user');
      inputEl.value = '';
      inputEl.style.height = 'auto';

      // Show typing indicator
      typingEl.classList.add('active');
      messagesEl.scrollTop = messagesEl.scrollHeight;

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, sessionId }),
        });

        const data = await res.json();

        typingEl.classList.remove('active');

        if (data.error) {
          addMessage(data.error, 'error');
        } else {
          addMessage(data.reply, 'bot');
        }
      } catch (err) {
        typingEl.classList.remove('active');
        addMessage('Failed to connect to agent.', 'error');
      }

      sending = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }

    // === DEVICE ACCESS ===

    const devicePanel = document.getElementById('device-panel');
    const deviceToggle = document.getElementById('device-toggle');

    function toggleDevicePanel() {
      devicePanel.classList.toggle('active');
      deviceToggle.classList.toggle('active');
    }

    function updateBadge(btnId, status) {
      const btn = document.getElementById(btnId);
      if (!btn) return;
      const badge = btn.querySelector('.perm-badge');
      if (badge) {
        badge.className = `perm-badge ${status}`;
      }
      if (status === 'granted') btn.classList.add('granted');
    }

    // Send device data as a message to the agent
    function sendDeviceData(label, data) {
      const text = `[Device: ${label}]\n${data}`;
      addMessage(text, 'bot');
      // Also send to agent for context
      fetch('/api/device', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId, type: label, data }),
      }).catch(() => {});
    }

    // Geolocation
    async function getLocation() {
      if (!navigator.geolocation) {
        addMessage('Geolocation not supported in this browser.', 'error');
        updateBadge('btn-location', 'denied');
        return;
      }

      addMessage('Requesting location...', 'bot');

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          updateBadge('btn-location', 'granted');
          const { latitude, longitude, accuracy, altitude, speed } = pos.coords;
          const info = [
            `Latitude: ${latitude.toFixed(6)}`,
            `Longitude: ${longitude.toFixed(6)}`,
            `Accuracy: ${accuracy?.toFixed(0) || 'N/A'}m`,
            altitude ? `Altitude: ${altitude.toFixed(0)}m` : null,
            speed ? `Speed: ${speed.toFixed(1)} m/s` : null,
            ``,
            `Maps: https://maps.google.com/?q=${latitude},${longitude}`,
          ].filter(Boolean).join('\n');
          sendDeviceData('Location', info);
        },
        (err) => {
          updateBadge('btn-location', 'denied');
          addMessage(`Location error: ${err.message}`, 'error');
        },
        { enableHighAccuracy: true, timeout: 15000 }
      );
    }

    // Camera
    async function getCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        updateBadge('btn-camera', 'granted');

        // Create video element to capture a frame
        const video = document.createElement('video');
        video.srcObject = stream;
        video.play();

        video.onloadeddata = () => {
          const canvas = document.createElement('canvas');
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          canvas.getContext('2d').drawImage(video, 0, 0);

          // Stop camera
          stream.getTracks().forEach(t => t.stop());

          const dataUrl = canvas.toDataURL('image/jpeg', 0.7);

          // Show photo in chat
          const div = document.createElement('div');
          div.className = 'msg bot';
          div.innerHTML = `<div style="margin-bottom:6px;color:#4caf50;">Camera Capture</div><img src="${dataUrl}" style="max-width:100%;border-radius:4px;">`;
          messagesEl.appendChild(div);
          messagesEl.scrollTop = messagesEl.scrollHeight;

          sendDeviceData('Camera', `Photo captured (${canvas.width}x${canvas.height})`);
        };
      } catch (err) {
        updateBadge('btn-camera', 'denied');
        addMessage(`Camera error: ${err.message}`, 'error');
      }
    }

    // Microphone
    async function getMicrophone() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        updateBadge('btn-mic', 'granted');

        addMessage('Microphone access granted. Recording 5 seconds...', 'bot');

        const recorder = new MediaRecorder(stream);
        const chunks = [];

        recorder.ondataavailable = (e) => chunks.push(e.data);
        recorder.onstop = () => {
          stream.getTracks().forEach(t => t.stop());
          const blob = new Blob(chunks, { type: 'audio/webm' });
          const url = URL.createObjectURL(blob);

          const div = document.createElement('div');
          div.className = 'msg bot';
          div.innerHTML = `<div style="margin-bottom:6px;color:#4caf50;">Audio Recording</div><audio controls src="${url}" style="width:100%;"></audio>`;
          messagesEl.appendChild(div);
          messagesEl.scrollTop = messagesEl.scrollHeight;

          sendDeviceData('Microphone', `Audio recorded (${(blob.size / 1024).toFixed(1)} KB)`);
        };

        recorder.start();
        setTimeout(() => recorder.stop(), 5000);
      } catch (err) {
        updateBadge('btn-mic', 'denied');
        addMessage(`Microphone error: ${err.message}`, 'error');
      }
    }

    // Battery
    async function getBatteryInfo() {
      try {
        if (!navigator.getBattery) {
          addMessage('Battery API not supported in this browser.', 'error');
          updateBadge('btn-battery', 'denied');
          return;
        }

        const battery = await navigator.getBattery();
        updateBadge('btn-battery', 'granted');

        const info = [
          `Level: ${(battery.level * 100).toFixed(0)}%`,
          `Charging: ${battery.charging ? 'Yes' : 'No'}`,
          battery.chargingTime !== Infinity ? `Time to full: ${Math.round(battery.chargingTime / 60)} min` : null,
          battery.dischargingTime !== Infinity ? `Time remaining: ${Math.round(battery.dischargingTime / 60)} min` : null,
        ].filter(Boolean).join('\n');

        sendDeviceData('Battery', info);
      } catch (err) {
        updateBadge('btn-battery', 'denied');
        addMessage(`Battery error: ${err.message}`, 'error');
      }
    }

    // Network info
    function getNetworkInfo() {
      const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
      if (!conn) {
        sendDeviceData('Network', `Online: ${navigator.onLine ? 'Yes' : 'No'}`);
        return;
      }

      const info = [
        `Online: ${navigator.onLine ? 'Yes' : 'No'}`,
        `Type: ${conn.effectiveType || 'unknown'}`,
        conn.downlink ? `Downlink: ${conn.downlink} Mbps` : null,
        conn.rtt ? `RTT: ${conn.rtt} ms` : null,
        conn.saveData !== undefined ? `Data Saver: ${conn.saveData ? 'On' : 'Off'}` : null,
      ].filter(Boolean).join('\n');

      sendDeviceData('Network', info);
    }

    // Device info (no permissions needed)
    function getDeviceInfo() {
      const info = [
        `Platform: ${navigator.platform}`,
        `User Agent: ${navigator.userAgent}`,
        `Language: ${navigator.language}`,
        `Cores: ${navigator.hardwareConcurrency || 'N/A'}`,
        `Memory: ${navigator.deviceMemory ? navigator.deviceMemory + ' GB' : 'N/A'}`,
        `Screen: ${screen.width}x${screen.height} @ ${window.devicePixelRatio}x`,
        `Touch: ${navigator.maxTouchPoints > 0 ? 'Yes (' + navigator.maxTouchPoints + ' points)' : 'No'}`,
        `Cookies: ${navigator.cookieEnabled ? 'Enabled' : 'Disabled'}`,
      ].join('\n');

      sendDeviceData('Device Info', info);
    }

    // Notification permission
    async function requestNotification() {
      if (!('Notification' in window)) {
        addMessage('Notifications not supported in this browser.', 'error');
        updateBadge('btn-notif', 'denied');
        return;
      }

      const perm = await Notification.requestPermission();
      if (perm === 'granted') {
        updateBadge('btn-notif', 'granted');
        new Notification('Clawd Agent', {
          body: 'Notifications enabled! I can now alert you.',
          icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🦞</text></svg>',
        });
        sendDeviceData('Notifications', 'Permission granted');
      } else {
        updateBadge('btn-notif', 'denied');
        addMessage(`Notification permission: ${perm}`, 'error');
      }
    }

    // Check existing permissions on load
    async function checkPermissions() {
      if (navigator.permissions) {
        const checks = [
          { name: 'geolocation', btn: 'btn-location' },
          { name: 'camera', btn: 'btn-camera' },
          { name: 'microphone', btn: 'btn-mic' },
          { name: 'notifications', btn: 'btn-notif' },
        ];
        for (const check of checks) {
          try {
            const result = await navigator.permissions.query({ name: check.name });
            updateBadge(check.btn, result.state === 'granted' ? 'granted' : result.state === 'denied' ? 'denied' : 'unknown');
          } catch {}
        }
      }
    }
    checkPermissions();

    // Focus input on load
    inputEl.focus();
  </script>
</body>
</html>
